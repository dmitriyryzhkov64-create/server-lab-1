name: Java CI with Maven and HTTPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Decode Keystore from Secrets
        run: |
          echo "${{ secrets.SSL_KEYSTORE_BASE64 }}" | base64 --decode > src/main/resources/server.jks

      - name: Build and Test with Maven
        run: mvn clean package
        env:
          SSL_STORE_PASSWORD: ${{ secrets.SSL_STORE_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-app-jar
          path: target/*.jar